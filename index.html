<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カメラスマート計算機</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f6f8; }
        video, canvas { width: 100%; max-width: 400px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        button { padding: 15px 30px; font-size: 18px; color: white; background-color: #007bff; border: none; border-radius: 25px; cursor: pointer; margin-bottom: 20px; }
        button:disabled { background-color: #ccc; }
        #result-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: left; max-width: 400px; margin: 0 auto; }
        .highlight { color: #d9534f; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <h2>問題を撮影して解く</h2>
    
    <video id="camera" autoplay playsinline></video>
    <canvas id="snapshot" style="display:none;"></canvas>
    <br>
    
    <button id="capture-btn">撮影して計算する</button>

    <div id="result-box">
        <p><strong>📝 読み取った文字列:</strong> <span id="ocr-result">-</span></p>
        <p><strong>⚙️ 変換後の数式:</strong> <span id="parsed-result">-</span></p>
        <p><strong>💡 答え:</strong> <span id="math-answer" class="highlight">-</span></p>
    </div>

    <script>
        const video = document.getElementById('camera');
        const canvas = document.getElementById('snapshot');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const ocrResultText = document.getElementById('ocr-result');
        const parsedResultText = document.getElementById('parsed-result');
        const mathAnswerText = document.getElementById('math-answer');

        // 1. カメラを起動する処理
        async function startCamera() {
            try {
                // 背面カメラを優先して起動
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("カメラの起動に失敗しました。ブラウザの権限を確認してください。");
                console.error(err);
            }
        }

        // 2. 文字列を数式に変換（パース）して解く関数
        function solveMath(ocrText) {
            // 余計な空白や改行を削除
            let text = ocrText.replace(/\s+/g, '');
            
            // AI APIを使わない場合、ここが「精度の命」になります。
            // OCRの誤認識や日本語表現を、計算可能な記号に置き換えます。
            let equation = text
                .replace(/[口□◯〇\?？]/g, 'x') // 四角や丸を変数 x に
                .replace(/[×xX]/g, '*')        // 掛け算記号を * に
                .replace(/[÷]/g, '/')          // 割り算記号を / に
                .replace(/の/g, '*')           // 「350の...」を掛け算に
                .replace(/%/g, '/100');        // %を /100 に変換

            parsedResultText.innerText = equation;

            try {
                // 等号(=)が含まれる「方程式」の場合
                if (equation.includes('=')) {
                    // xについての方程式を解く
                    let solution = nerdamer.solveEquations(equation, 'x');
                    mathAnswerText.innerText = "x = " + solution.toString();
                } else {
                    // 単なる計算式の場合（例: 10 + 20）
                    let result = nerdamer(equation).evaluate().text();
                    mathAnswerText.innerText = result;
                }
            } catch (e) {
                mathAnswerText.innerText = "計算できませんでした（式の形式を確認してください）";
                console.error(e);
            }
        }

        // 3. 撮影ボタンが押された時の処理
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            captureBtn.innerText = "読み取り中...";
            ocrResultText.innerText = "処理中...";
            parsedResultText.innerText = "-";
            mathAnswerText.innerText = "-";

            // ビデオの現在のフレームをCanvasに描画
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Tesseract.jsでOCR（日本語と英語・数字を読み取り）
            const dataUrl = canvas.toDataURL('image/png');
            try {
                const result = await Tesseract.recognize(
                    dataUrl,
                    'jpn+eng', // 日本語（「の」などを読むため）と英語（数字や記号）
                    { logger: m => console.log(m) }
                );
                
                const readText = result.data.text;
                ocrResultText.innerText = readText;
                
                // 読み取ったテキストを計算に回す
                solveMath(readText);
            } catch (err) {
                ocrResultText.innerText = "読み取りエラー";
                console.error(err);
            } finally {
                captureBtn.disabled = false;
                captureBtn.innerText = "撮影して計算する";
            }
        });

        // アプリ起動時にカメラを開始
        startCamera();
    </script>
</body>
</html>
